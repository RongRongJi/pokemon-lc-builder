name: Release APK

# 打 tag (v*) 时自动创建 GitHub Release 并上传仓库中的 release.apk
# 使用方法：
#   1. 在本地执行 Android 构建生成 release APK
#   2. 将 APK 拷贝到仓库根目录并命名为 release.apk
#   3. 提交并推送：git add release.apk && git commit -m "chore: update release.apk" && git push
#   4. 打 tag 并推送：git tag v1.0.1 && git push origin v1.0.1
# 也可以在 Actions 页面手动触发（workflow_dispatch）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Release tag (e.g., v1.0.1)'
        required: false
        default: 'v1.0.1'

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release.apk exists
        run: |
          if [ ! -f "release.apk" ]; then
            echo "❌ 未找到 release.apk！请先将本地构建好的 APK 拷贝到仓库根目录。"
            echo "当前仓库根目录文件："
            ls -la
            exit 1
          fi
          echo "✅ 找到 release.apk，大小：$(du -h release.apk | cut -f1)"

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag || github.ref_name }}
          name: LC Builder ${{ github.event.inputs.version_tag || github.ref_name }}
          body: |
            ## 宝可梦 LC 组队工具 - Android App

            **APK 下载**：点击下方 `release.apk`

            安装说明：
            - Android 设置 → 允许"未知来源应用"
            - 在手机文件管理器中点击 APK 进行安装

            **前端站点**：https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          files: release.apk
          draft: false
          prerelease: false
