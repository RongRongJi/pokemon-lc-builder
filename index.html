<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta Tags -->
    <title>LC Builder — Little Cup Pokemon Team Builder</title>
    <meta name="title" content="LC Builder — Little Cup Pokemon Team Builder" />
    <meta name="description" content="Build Little Cup (LC) Pokemon teams with IV/EV calculators, Smogon set data, bilingual (EN/ZH) support. 215 Pokemon, 800+ sets, full item/move coverage." />
    <meta name="theme-color" content="#1e3a8a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="LC Builder — Little Cup Pokemon Team Builder" />
    <meta property="og:description" content="Build Little Cup Pokemon teams with IV/EV calculators and Smogon sets. Bilingual EN/ZH interface." />
    <meta property="og:image" content="./og-cover.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="LC Builder cover with logo" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LC Builder — Little Cup Pokemon Team Builder" />
    <meta name="twitter:description" content="Build Little Cup Pokemon teams with IV/EV calculators and Smogon sets." />
    <meta name="twitter:image" content="./og-cover.png" />

    <style>
      html, body { margin: 0; padding: 0; overflow-x: hidden; }
    </style>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
